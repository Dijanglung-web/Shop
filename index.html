<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStore - Shop Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f1f3f6}
header{background:#2874f0;color:white;padding:10px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:18px;cursor:pointer}
#search{flex:1;padding:8px;border:none;border-radius:2px}
.btn{background:#ff9f00;color:white;border:none;padding:8px 12px;border-radius:2px;font-weight:600}
.btn-outline{background:white;color:#2874f0;border:1px solid #2874f0}
.nav{background:white;display:flex;overflow-x:auto;padding:8px;gap:15px;border-bottom:1px solid #e0e0e0}
.nav span{white-space:nowrap;font-size:14px;color:#212121;cursor:pointer}
.nav.active{color:#2874f0;border-bottom:2px solid #2874f0}
#products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px}
.card{background:white;border-radius:4px;padding:8px;position:relative}
.card img{width:100%;height:140px;object-fit:contain}
.card h3{font-size:13px;margin:6px 0;height:32px;overflow:hidden}
.price{font-weight:700;font-size:15px}
#adminPanel,#productPage,#cartPage,#ordersPage{display:none;padding:15px;background:white;margin:10px;border-radius:4px}
input,select,textarea{width:100%;padding:8px;margin:6px 0;border:1px solid #ddd;border-radius:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.cart-item img{width:60px;height:60px;object-fit:contain}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:28px;height:28px;border:1px solid #ddd;background:white}
.hide{display:none}
.badge{background:#ff6161;color:white;border-radius:10px;padding:2px 6px;font-size:11px;position:absolute;top:-5px;right:-5px}
.user-info{font-size:12px;color:#fff;margin-right:8px}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="showHome()">MyStore</div>
  <input id="search" placeholder="Search products">
  <div style="position:relative">
    <button class="btn-outline" onclick="showCart()">🛒</button>
    <span id="cartCount" class="badge hide">0</span>
  </div>
  <button class="btn-outline hide" id="ordersBtn" onclick="showOrders()">Orders</button>
  <span class="user-info hide" id="userInfo"></span>
  <button class="btn" id="loginBtn">Login</button>
  <button class="btn hide" id="logoutBtn">Logout</button>
</header>

<div class="nav" id="categories">
  <span class="active" onclick="filterCat('All')">All</span>
  <span onclick="filterCat('Electronics')">Electronics</span>
  <span onclick="filterCat('Fashion')">Fashion</span>
  <span onclick="filterCat('Home')">Home</span>
</div>

<div id="adminPanel">
  <h3>Admin Panel - Add Product</h3>
  <div class="grid2">
    <input id="pName" placeholder="Product name">
    <input id="pPrice" type="number" placeholder="Price">
    <select id="pCat"><option>Electronics</option><option>Fashion</option><option>Home</option></select>
    <input id="pStock" type="number" placeholder="Stock">
  </div>
  <input id="pImg" placeholder="Image URL">
  <textarea id="pDesc" placeholder="Description"></textarea>
  <button class="btn" id="addBtn">Add Product</button>
  <h4 style="margin-top:15px">Manage Products</h4>
  <div id="adminList"></div>
  <h4 style="margin-top:15px">All Customer Orders</h4>
  <div id="allOrders"></div>
</div>

<div id="productPage"></div>
<div id="cartPage"></div>
<div id="ordersPage"></div>
<div id="products"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, where, getDocs, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'

// PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {YOUR_CONFIG};
const ADMIN_EMAIL = "panjenloungam@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allProducts = [], cart = [], currentUser = null, currentCat = 'All';

loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user) {
    loginBtn.classList.add('hide');
    logoutBtn.classList.remove('hide');
    ordersBtn.classList.remove('hide');
    userInfo.textContent = user.displayName;
    userInfo.classList.remove('hide');
    
    // Load user cart from Firebase
    const cartSnap = await getDocs(query(collection(db,'carts'), where('uid','==',user.uid)));
    cart = cartSnap.docs.length? cartSnap.docs[0].data().items : [];
    updateCartCount();
    
    // Show admin panel only for admin
    if(user.email === ADMIN_EMAIL) {
      adminPanel.style.display = 'block';
      loadAllOrders();
    } else {
      adminPanel.style.display = 'none';
    }
  } else {
    adminPanel.style.display = 'none';
    loginBtn.classList.remove('hide');
    logoutBtn.classList.add('hide');
    ordersBtn.classList.add('hide');
    userInfo.classList.add('hide');
    cart = [];
    updateCartCount();
  }
});

document.getElementById('addBtn').onclick = async () => {
  if(currentUser?.email!== ADMIN_EMAIL) return alert('Admin only');
  await addDoc(collection(db, 'products'), {
    name: pName.value, price: +pPrice.value, img: pImg.value, desc: pDesc.value,
    cat: pCat.value, stock: +pStock.value, created: Date.now()
  });
  pName.value = pPrice.value = pImg.value = pDesc.value = pStock.value = '';
};

onSnapshot(query(collection(db, 'products'), orderBy('created','desc')), snap => {
  allProducts = snap.docs.map(d => ({id: d.id,...d.data()}));
  renderProducts();
  renderAdminList();
});

search.oninput = renderProducts;

window.filterCat = (cat) => {
  currentCat = cat;
  document.querySelectorAll('.nav span').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts();
};

function renderProducts() {
  const term = search.value.toLowerCase();
  let list = allProducts.filter(p => 
    (currentCat === 'All' || p.cat === currentCat) && 
    p.name.toLowerCase().includes(term)
  );
  products.innerHTML = list.map(p => `
    <div class="card" onclick="showProduct('${p.id}')">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140'">
      <h3>${p.name}</h3>
      <div class="price">₹${p.price}</div>
      <button class="btn" onclick="event.stopPropagation();addCart('${p.id}')">Add to Cart</button>
    </div>
  `).join('');
}

window.addCart = async (id) => {
  if(!currentUser) return alert('Please login first');
  const item = cart.find(i => i.id === id);
  if(item) item.qty++; else cart.push({id, qty: 1});
  await saveCart();
  updateCartCount();
};

async function saveCart() {
  if(!currentUser) return;
  await setDoc(doc(db,'carts',currentUser.uid), {uid: currentUser.uid, items: cart});
}

window.showProduct = (id) => {
  const p = allProducts.find(x => x.id === id);
  productPage.style.display = 'block';
  products.style.display = 'none';
  cartPage.style.display = 'none';
  ordersPage.style.display = 'none';
  productPage.innerHTML = `
    <button onclick="showHome()">← Back</button>
    <img src="${p.img}" style="width:100%;max-height:300px;object-fit:contain">
    <h2>${p.name}</h2><h3>₹${p.price}</h3>
    <p>Category: ${p.cat} | Stock: ${p.stock}</p>
    <p>${p.desc}</p>
    <button class="btn" onclick="addCart('${p.id}')">Add to Cart</button>
  `;
};

window.showCart = () => {
  if(!currentUser) return alert('Please login first');
  products.style.display = 'none';
  productPage.style.display = 'none';
  ordersPage.style.display = 'none';
  cartPage.style.display = 'block';
  const cartItems = cart.map(c => {
    const p = allProducts.find(x => x.id === c.id);
    return p? {...p, qty: c.qty} : null;
  }).filter(Boolean);
  const total = cartItems.reduce((s,i) => s + i.price * i.qty, 0);
  cartPage.innerHTML = `
    <button onclick="showHome()">← Back</button><h3>My Cart</h3>
    ${cartItems.length? cartItems.map(i => `
      <div class="cart-item">
        <img src="${i.img}">
        <div style="flex:1"><h4>${i.name}</h4><div>₹${i.price}</div>
          <div class="qty">
            <button onclick="changeQty('${i.id}',-1)">-</button>
            <span>${i.qty}</span>
            <button onclick="changeQty('${i.id}',1)">+</button>
          </div>
        </div>
        <button onclick="removeCart('${i.id}')">✕</button>
      </div>
    `).join('') : '<p>Cart is empty</p>'}
    <h3>Total: ₹${total}</h3>
    <button class="btn" onclick="checkout()" ${!cartItems.length?'disabled':''}>Place Order</button>
  `;
};

window.changeQty = async (id, d) => {
  const item = cart.find(i => i.id === id);
  item.qty += d;
  if(item.qty < 1) cart = cart.filter(i => i.id!== id);
  await saveCart();
  showCart();
};

window.removeCart = async (id) => {
  cart = cart.filter(i => i.id!== id);
  await saveCart();
  showCart();
};

window.checkout = async () => {
  if(!currentUser ||!cart.length) return;
  const order = {
    uid: currentUser.uid,
    email: currentUser.email,
    name: currentUser.displayName,
    items: cart,
    total: cart.reduce((s,c) => {
      const p = allProducts.find(x => x.id === c.id);
      return s + (p? p.price * c.qty : 0);
    }, 0),
    status: 'Placed',
    date: Date.now()
  };
  await addDoc(collection(db,'orders'), order);
  cart = [];
  await saveCart();
  alert('Order placed! Check Orders page.');
  showHome();
};

window.showOrders = async () => {
  if(!currentUser) return;
  products.style.display = 'none';
  productPage.style.display = 'none';
  cartPage.style.display = 'none';
  ordersPage.style.display = 'block';
  const snap = await getDocs(query(collection(db,'orders'), where('uid','==',currentUser.uid), orderBy('date','desc')));
  ordersPage.innerHTML = `
    <button onclick="showHome()">← Back</button><h3>My Orders</h3>
    ${snap.docs.map(d => {
      const o = d.data();
      return `<div style="border:1px solid #ddd;padding:10px;margin:8px 0;border-radius:4px">
        <div><b>Order #${d.id.slice(0,6)}</b> - ${new Date(o.date).toLocaleDateString()}</div>
        <div>Status: ${o.status}</div><div>Total: ₹${o.total}</div>
      </div>`
    }).join('') || '<p>No orders yet</p>'}
  `;
};

window.showHome = () => {
  products.style.display = 'grid';
  productPage.style.display = 'none';
  cartPage.style.display = 'none';
  ordersPage.style.display = 'none';
};

function updateCartCount() {
  const count = cart.reduce((s,i) => s + i.qty, 0);
  cartCount.textContent = count;
  cartCount.classList.toggle('hide', count === 0);
}

function renderAdminList() {
  if(currentUser?.email!== ADMIN_EMAIL) return;
  adminList.innerHTML = allProducts.map(p => `
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee">
      <span>${p.name} - ₹${p.price} | Stock: ${p.stock}</span>
      <button onclick="deleteDoc(doc(db,'products','${p.id}'))">Delete</button>
    </div>
  `).join('');
}

async function loadAllOrders() {
  const snap = await getDocs(query(collection(db,'orders'), orderBy('date','desc')));
  allOrders.innerHTML = snap.docs.map(d => {
    const o = d.data();
    return `<div style="border:1px solid #ddd;padding:8px;margin:6px 0;font-size:13px">
      <b>${o.name}</b> (${o.email}) - ₹${o.total} - ${o.status}
    </div>`
  }).join('') || 'No orders yet';
}

updateCartCount();
</script>
</body>
  </html>
